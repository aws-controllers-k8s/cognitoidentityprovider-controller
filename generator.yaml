ignore:
  resource_names:
      - Group
      - IdentityProvider
      - ResourceServer
      - UserImportJob
      - UserPoolClient
      - UserPoolDomain
model_name: cognito-idp

resources:
  UserPool:
    renames:
      operations:
        DescribeUserPool:
          input_fields:
            UserPoolId: Id
        UpdateUserPool:
          input_fields:
            UserPoolId: Id
        DeleteUserPool:
          input_fields:
            UserPoolId: Id
        CreateUserPool:
          input_fields:
            PoolName: Name
    tags:
      ignore: true